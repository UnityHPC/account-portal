networks:
  default:
    name: unity_dev_network
services:
  identity:
    hostname: identity
    build: identity
    ports:
      - "127.0.0.1:8010:80"
      - "127.0.0.1:389:389"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -f /tmp/up ]; then (nc -z localhost 389 && touch /tmp/up); else true; fi",
        ]
      interval: 1s
  sql:
    hostname: sql
    build: sql
    ports:
      - "127.0.0.1:8020:80"
      - "127.0.0.1:3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -f /tmp/up ]; then (nc -z localhost 3306 && touch /tmp/up); else true; fi",
        ]
      interval: 1s
  smtp:
    hostname: smtp
    image: schickling/mailcatcher
    ports:
      - "127.0.0.1:8030:1080"
  web:
    hostname: web
    build: web
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ../../:/var/www/unity-web-portal
      - ../../test/deployment/overrides/phpunit:/var/www/unity-web-portal/deployment/overrides/phpunit
      # docker doesn't like how these paths have colons in them
      # https://github.com/docker/compose/issues/12553#issuecomment-2656090965
      - type: bind
        source: ../../test/deployment/overrides/account-portal-docker-web-green:8000
        target: /var/www/unity-web-portal/deployment/overrides/account-portal-docker-web-green:8000
        bind:
          create_host_path: false
      - type: bind
        source: ../../test/deployment/overrides/account-portal-docker-web:8000
        target: /var/www/unity-web-portal/deployment/overrides/account-portal-docker-web:8000
        bind:
          create_host_path: false
    depends_on:
      identity:
        condition: service_healthy
      sql:
        condition: service_healthy
      smtp:
        condition: service_started
