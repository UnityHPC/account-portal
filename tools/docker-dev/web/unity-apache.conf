<VirtualHost _default_:80>
    DocumentRoot /var/www/unity-web-portal/public
    <LocationMatch '^/(panel|admin)'>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # https://stackoverflow.com/a/13295036/18696276
        # RewriteCond %{LA-U:REMOTE_USER} !^$
        RewriteRule ^ /index.php [QSA,L]
    </LocationMatch>
    <Location /lan>
        # in production you should require an address in your LAN, example "Require ip 10.0.0.0/8"
        AuthType basic
        Require all granted
        CGIPassAuth On
    </Location>
    <Files "index.php">
        AuthType Basic
        AuthName "Unity User Panel"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
        SetEnv givenName "DevFirstname"
        SetEnv sn "DevLastname"
        SetEnv mail "DevName@DevDomain.com"
    </Files>
</VirtualHost>
